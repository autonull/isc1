<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISC — Meet your thought neighbors</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Top Navigation -->
      <nav id="top-nav">
        <button class="nav-btn active" data-tab="now">🏠 Now</button>
        <button class="nav-btn" data-tab="discover">📡 Discover</button>
        <button class="nav-btn" data-tab="compose">➕ Compose</button>
        <button class="nav-btn" data-tab="chats">💬 Chats</button>
        <button class="nav-btn" data-tab="settings">⚙️ Settings</button>
        <button class="nav-btn" data-tab="test">🧪 Test Match</button>
      </nav>

      <!-- Main Content Area -->
      <main id="main-content">

        <!-- Tab 1: Now -->
        <section id="tab-now" class="tab-content active">
          <header class="channel-header" id="now-channel-header">
            <p>Select or create a channel to start matching.</p>
          </header>
          <div class="match-list" id="now-match-list">
          </div>
        </section>

        <!-- Tab 2: Discover -->
        <section id="tab-discover" class="tab-content">
          <div class="search-bar">
            <input type="text" placeholder="🔍 Search thoughts..." />
          </div>
          <h3>Trending Now</h3>
          <div class="trending-cards" id="discover-trending-cards">
            <p>Trending not available yet.</p>
          </div>
        </section>

        <!-- Tab 3: Compose -->
        <section id="tab-compose" class="tab-content">
          <header class="compose-header">
            <button class="btn-cancel" id="btn-compose-cancel">← Cancel</button>
            <h2>New Channel</h2>
          </header>
          <div class="compose-body">
            <label>Channel Name</label>
            <input type="text" id="compose-name" placeholder="E.g., AI Ethics" />

            <label>What are you thinking about?</label>
            <textarea id="compose-description" rows="4" placeholder="Describe your thought..."></textarea>

            <button class="btn-add-context" id="btn-add-context">+ Add context (optional)</button>
            <div class="context-list" id="compose-context-list">
            </div>

            <div class="spread-control">
              <label>How specific are you being?</label>
              <div class="slider-wrapper">
                <span>Precise</span>
                <input type="range" id="compose-spread" min="1" max="100" value="30" />
                <span>Exploratory</span>
              </div>
            </div>

            <button class="btn-primary" id="btn-publish-channel">Publish Channel</button>
            <div id="compose-status" style="margin-top: 1rem; color: var(--text-secondary);"></div>
          </div>
        </section>

        <!-- Tab 4: Chats -->
        <section id="tab-chats" class="tab-content">
          <header class="chats-header">
            <h2>Chats</h2>
          </header>
          <div class="chat-list" id="chat-list">
            <p>No active chats.</p>
          </div>
        </section>

        <!-- Tab 5: Settings -->
        <section id="tab-settings" class="tab-content">
          <h2>Profile</h2>
          <div class="profile-card">
            <h3>Your Peer ID</h3>
            <p id="profile-peer-id">Loading...</p>
            <p class="bio" id="profile-bio">"No active channels"</p>
          </div>

          <h3>Your Channels (<span id="settings-channel-count">0</span>)</h3>
          <div class="channel-list" id="settings-channel-list">
          </div>
        </section>

        <!-- Tab 6: Test Match -->
        <section id="tab-test" class="tab-content">
          <header class="chats-header">
            <h2>Semantic Matcher Test</h2>
          </header>
          <div class="compose-body">
            <label>Channel A Description</label>
            <textarea id="test-input-a" rows="3">Ethical implications of machine learning and autonomy</textarea>

            <label>Channel B Description</label>
            <textarea id="test-input-b" rows="3">The philosophy of AI art and copyright</textarea>

            <button id="btn-test-match" class="btn-primary" disabled>Compute Match (Wait for model)</button>

            <div style="margin-top: 1rem;">
              <strong>Similarity Score:</strong> <span id="test-match-result">N/A</span>
            </div>
          </div>
        </section>

      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
